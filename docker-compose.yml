version: '3.8'
services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: web_design_db
      MYSQL_ROOT_PASSWORD: password_admin
    ports:
      - "3306:3306"

  www:
    image: php:8.2-apache
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db